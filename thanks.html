  <style>
    :root {
      --bg:      #020a18;
      --navy:    #07152e;
      --border:  rgba(255,255,255,0.08);
      --gold:    #c8941a;
      --gold-lt: #f0b840;
      --text:    #dce8f5;
      --muted:   #5f82a8;
      --wa:      #25D366;
      --wa-glow: rgba(37,211,102,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100dvh;
      font-family: 'Heebo', sans-serif;
      background:
        linear-gradient(to bottom, rgba(2,10,24,0.6) 0%, rgba(2,10,24,0.75) 50%, rgba(2,10,24,0.92) 100%),
        url('https://images.pexels.com/photos/5688674/pexels-photo-5688674.jpeg?auto=compress&cs=tinysrgb&w=1920&q=80')
        center 35% / cover no-repeat fixed;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 1.75rem;
      padding: 3rem 2rem;
      max-width: 400px;
      width: 100%;
      backdrop-filter: blur(12px);
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.2rem;
      display: block;
      animation: pop .5s ease .15s both;
    }

    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: .6rem;
      color: var(--gold-lt);
    }

    .subtitle {
      font-size: .95rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    /* countdown ring */
    .countdown-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .4rem;
      margin-bottom: 1.6rem;
    }
    .countdown-ring {
      position: relative;
      width: 64px;
      height: 64px;
    }
    .countdown-ring svg { transform: rotate(-90deg); }
    .countdown-ring circle {
      fill: none;
      stroke-width: 4;
    }
    .ring-bg  { stroke: var(--border); }
    .ring-bar { stroke: var(--wa); stroke-linecap: round; transition: stroke-dashoffset .9s linear; }
    .countdown-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--wa);
    }
    .countdown-label {
      font-size: .78rem;
      color: var(--muted);
    }

    .btn-wa {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .65rem;
      background: linear-gradient(135deg, #28e86e 0%, var(--wa) 60%, #1ab854 100%);
      color: #fff;
      font-family: inherit;
      font-weight: 900;
      font-size: 1.05rem;
      padding: 1rem 1.5rem;
      border-radius: 1rem;
      text-decoration: none;
      width: 100%;
      box-shadow: 0 4px 24px var(--wa-glow);
      transition: transform .15s, filter .15s;
    }
    .btn-wa:hover  { transform: translateY(-2px); filter: brightness(1.08); }
    .btn-wa:active { transform: scale(.97); }
    .btn-wa svg { width: 22px; height: 22px; flex-shrink: 0; }

    .note {
      margin-top: 1rem;
      font-size: .75rem;
      color: rgba(95,130,168,.5);
    }
  </style>
</head>
<body>

<div class="card">
  <span class="icon">🎣</span>

  <h1>ברוך הבא לקהילה!</h1>

  <p class="subtitle">
    תודה שנרשמת.<br/>
    אתה מועבר לקבוצת הוואטסאפ עוד כמה שניות —<br/>
    שם תמצא דילים, המלצות וציוד שעובד אמיתי.
  </p>

  <div class="countdown-wrap" aria-label="ספירה לאחור להצטרפות">
    <div class="countdown-ring">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle class="ring-bg"  cx="32" cy="32" r="28"/>
        <circle class="ring-bar" cx="32" cy="32" r="28"
          stroke-dasharray="175.9"
          stroke-dashoffset="0"
          id="ringBar"/>
      </svg>
      <div class="countdown-num" id="countdown">3</div>
    </div>
    <span class="countdown-label">שניות</span>
  </div>

  <a href="https://spoo.me/daig-wa" class="btn-wa" id="waBtn">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    לחץ כאן להצטרף עכשיו
  </a>

  <p class="note">חינם לגמרי · אפשר לצאת בכל רגע</p>
</div>

<script>
  const WA_URL = 'https://spoo.me/daig-wa';
  const SECONDS = 3;
  const circumference = 175.9;

  const ringBar     = document.getElementById('ringBar');
  const countdownEl = document.getElementById('countdown');

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.querySelector('.countdown-wrap').style.display = 'none';
  } else {
    let remaining = SECONDS;

    const tick = () => {
      remaining--;
      countdownEl.textContent = remaining;
      ringBar.style.strokeDashoffset = circumference * (1 - remaining / SECONDS);

      if (remaining <= 0) {
        clearInterval(timer);
        window.location.href = WA_URL;
      }
    };

    ringBar.style.strokeDashoffset = '0';
    const timer = setInterval(tick, 1000);
  }
</script>
</body>
</html>
